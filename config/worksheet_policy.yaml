policies:
  balanced_default:
    description: "通用均衡训练卷，适合无明显单一短板时使用。"
    max_questions: 14
    sections:
      - question_type: "递等式计算"
        min_count: 3
        max_count: 4
        layout: "two_columns"
      - question_type: "方程"
        min_count: 2
        max_count: 3
        layout: "two_columns"
      - question_type: "单位换算"
        min_count: 1
        max_count: 2
        layout: "single_column"
      - question_type: "几何计算"
        min_count: 2
        max_count: 3
        layout: "single_column"
      - question_type: "应用题"
        min_count: 2
        max_count: 3
        layout: "single_column"
  geometry_priority:
    description: "立体几何、体积、表面积、容积、排水法主攻模式。"
    max_questions: 14
    sections:
      - question_type: "递等式计算"
        min_count: 2
        max_count: 3
        layout: "two_columns"
      - question_type: "方程"
        min_count: 1
        max_count: 2
        layout: "two_columns"
      - question_type: "单位换算"
        min_count: 2
        max_count: 3
        layout: "single_column"
      - question_type: "几何计算"
        min_count: 4
        max_count: 5
        layout: "single_column"
      - question_type: "应用题"
        min_count: 2
        max_count: 3
        layout: "single_column"
  application_reading_priority:
    description: "应用题审题、关键词、数量关系、建模主攻模式。"
    max_questions: 14
    sections:
      - question_type: "递等式计算"
        min_count: 2
        max_count: 3
        layout: "two_columns"
      - question_type: "方程"
        min_count: 2
        max_count: 3
        layout: "two_columns"
      - question_type: "单位换算"
        min_count: 1
        max_count: 2
        layout: "single_column"
      - question_type: "几何计算"
        min_count: 1
        max_count: 2
        layout: "single_column"
      - question_type: "应用题"
        min_count: 4
        max_count: 5
        layout: "single_column"
  calculation_remediation:
    description: "计算稳定性补救模式。"
    max_questions: 14
    sections:
      - question_type: "递等式计算"
        min_count: 5
        max_count: 6
        layout: "two_columns"
      - question_type: "方程"
        min_count: 2
        max_count: 3
        layout: "two_columns"
      - question_type: "单位换算"
        min_count: 1
        max_count: 2
        layout: "single_column"
      - question_type: "几何计算"
        min_count: 1
        max_count: 2
        layout: "single_column"
      - question_type: "应用题"
        min_count: 2
        max_count: 3
        layout: "single_column"
difficulty_policy:
  基础:
    min: 0
    max: 14
  中等:
    min: 0
    max: 14
  提高:
    min: 0
    max: 4
  浅奥:
    min: 0
    max: 1
