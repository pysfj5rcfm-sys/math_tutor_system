mistake_tags:
  - code: "C1"
    category: "计算执行错误"
    name: "基础计算错误"
    scope: "general"
    subjects:
      - "math"
      - "physics"
      - "chemistry"
    legacy_compatible: true
    description: "简单加减乘除、口算或笔算过程中的基础错误。"
    typical_symptoms:
      - "口算或笔算结果错误"
      - "进位、退位、乘除步骤不稳定"
    training_hint: "安排短时基础计算与检查训练。"
    default_question_types:
      - "math_calculation"
      - "physics_calculation"
    active: true
  - code: "C2"
    category: "计算执行错误"
    name: "运算顺序错误"
    scope: "subject_specific"
    subjects:
      - "math"
    legacy_compatible: true
    description: "括号、先乘除后加减、递等式步骤顺序错误。"
    typical_symptoms:
      - "先算了不该先算的部分"
      - "递等式过程顺序混乱"
    training_hint: "先圈运算顺序，再进行递等式计算。"
    default_question_types:
      - "math_calculation"
    active: true
  - code: "C3"
    category: "计算执行错误"
