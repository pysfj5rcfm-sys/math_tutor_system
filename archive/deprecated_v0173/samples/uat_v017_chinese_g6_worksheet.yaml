  sections:
    - name: "一、现代文阅读"
      layout: "single_column"
      questions:
        - question_no: "1"
          question_type_code: "chinese_reading"
          knowledge_point_id: "chinese_g6_reading_inference"
          target_mistake_tag_code: "CHN_Q_1"
          difficulty_code: "medium"
          question: "阅读短文《雨后的操场》后，概括主人公心情发生了怎样的变化。"
          answer: "由失落转为轻松和期待。"
          explanation: "答案要抓住开头和结尾的情绪词，并说明变化。"
        - question_no: "2"
          question_type_code: "chinese_text_evidence"
          knowledge_point_id: "chinese_g6_text_evidence"
          target_mistake_tag_code: "CHN_EVD_1"
          difficulty_code: "medium"
          question: "你认为文中的同学为什么主动留下来？请结合文本依据回答。"
          answer: "因为他有责任感。依据是他看到器材未收好后主动提醒并一起整理。"
          explanation: "先给观点，再补文本证据。"
    - name: "二、作文片段"
      layout: "single_column"
      questions:
        - question_no: "3"
          question_type_code: "chinese_composition_fragment"
          knowledge_point_id: "chinese_g6_composition_detail"
          target_mistake_tag_code: "CHN_COMP_2"
          difficulty_code: "advanced"
          question: "写一段 120 字左右的细节描写，表现雨后校园的清新。"
          answer: "略。"
          explanation: "应包含视觉、嗅觉或动作细节，避免空泛抒情。"
