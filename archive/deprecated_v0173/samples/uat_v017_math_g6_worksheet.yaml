worksheet:
  title: "六年级数学预初适应训练 UAT"
  date: "2026-06-03"
  student_id: "daughter"
  subject_id: "math"
  grade_at_time: 6
  term_at_time: "六年级上"
  curriculum_version_at_time: "cn_k12_2022"
  textbook_version_at_time: "generic"
  source: "uat_v017_fixture"
  sections:
    - name: "一、计算 / 数与运算"
      layout: "two_columns"
      questions:
        - question_no: "1"
          question_type_code: "math_calculation"
          knowledge_point_id: "math_g6_fraction_decimal_percent"
          target_mistake_tag_code: "C3"
          difficulty_code: "basic"
          question: "计算：3.6 × 0.25 + 1.4 × 0.25。"
          answer: "1.25"
          explanation: "先提取 0.25，得到 (3.6+1.4)×0.25=5×0.25=1.25。"
    - name: "二、方程 / 应用题建模"
      layout: "single_column"
      questions:
        - question_no: "2"
          question_type_code: "math_equation"
          knowledge_point_id: "math_g6_equation_basic"
          target_mistake_tag_code: "MATH_MODEL_1"
          difficulty_code: "medium"
          question: "一个数的 3 倍比它多 24，求这个数。"
          answer: "12"
          explanation: "设这个数为 x，3x-x=24，2x=24，x=12。"
        - question_no: "3"
          question_type_code: "math_geometry_calculation"
          knowledge_point_id: "math_g6_geometry_measurement"
          target_mistake_tag_code: "G1"
          difficulty_code: "medium"
          question: "长方形长 12 cm、宽 8 cm，求周长和面积。"
          answer: "周长 40 cm，面积 96 cm²。"
          explanation: "周长=(12+8)×2=40，面积=12×8=96。"
