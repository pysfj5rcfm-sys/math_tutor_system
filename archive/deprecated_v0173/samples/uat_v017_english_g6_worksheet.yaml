worksheet:
  title: "Grade 6 English Language Practice UAT"
  date: "2026-06-03"
  student_id: "daughter"
  subject_id: "english"
  grade_at_time: 6
  term_at_time: "六年级上"
  curriculum_version_at_time: "cn_k12_2022"
  textbook_version_at_time: "generic"
  source: "uat_v017_fixture"
  sections:
    - name: "I. Vocabulary / Chunks"
      layout: "single_column"
      questions:
        - question_no: "1"
          question_type_code: "english_vocabulary"
          knowledge_point_id: "english_g6_word_chunks"
          target_mistake_tag_code: "ENG_CHUNK_1"
          difficulty_code: "basic"
          question: "Fill in the blank: I am good ___ playing the piano."
          answer: "at"
          explanation: "The chunk is 'be good at'."
    - name: "II. Grammar / Reading"
      layout: "single_column"
      questions:
        - question_no: "2"
          question_type_code: "english_grammar"
          knowledge_point_id: "english_g6_tense_basic"
          target_mistake_tag_code: "ENG_GRAM_1"
          difficulty_code: "medium"
          question: "Rewrite in past tense: Tom visits his grandparents on Sunday."
          answer: "Tom visited his grandparents on Sunday."
          explanation: "Change visits to visited."
        - question_no: "3"
          question_type_code: "english_reading"
          knowledge_point_id: "english_g6_reading_detail"
          target_mistake_tag_code: "ENG_READ_1"
          difficulty_code: "medium"
          question: "Read: Lily takes the bus to school because her home is far away. How does Lily go to school?"
          answer: "She takes the bus."
          explanation: "Locate the detail 'takes the bus'."
    - name: "III. Short Writing"
      layout: "single_column"
      questions:
        - question_no: "4"
          question_type_code: "english_writing_short"
          knowledge_point_id: "english_g6_sentence_writing"
          target_mistake_tag_code: "ENG_WRITE_1"
          difficulty_code: "advanced"
          question: "Write three sentences about your favorite school activity."
          answer: "Example: I like reading club. We read interesting stories. I can share ideas with my friends."
          explanation: "Use clear sentences and avoid repeating the same pattern too much."
