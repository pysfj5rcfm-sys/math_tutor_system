worksheet:
  title: "八年级物理速度与实验专项"
  date: "2026-06-01"
  student_id: "uat_physics_g8"
  subject_id: "physics"
  grade_at_time: 8
  term_at_time: "八年级上"
  curriculum_version_at_time: "cn_k12_2022"
  source: "uat_v016"
  sections:
    - name: "一、速度计算"
      layout: "single_column"
      questions:
        - question_type_code: "physics_calculation"
          knowledge_point_id: "physics_g8_speed"
          target_mistake_tag_code: "PHY_F1"
          difficulty_code: "basic"
          question: "一辆小车 10 s 内通过 50 m，速度是多少？"
          answer: "5 m/s"
          explanation: "v=s/t=50÷10=5 m/s。"
        - question_type_code: "physics_calculation"
          knowledge_point_id: "physics_g8_speed"
          target_mistake_tag_code: "PHY_U1"
          difficulty_code: "medium"
          question: "某物体 2 min 通过 240 m，平均速度是多少 m/s？"
          answer: "2 m/s"
          explanation: "2 min=120 s，v=s/t=240÷120=2 m/s。"
    - name: "二、实验判断"
      layout: "single_column"
      questions:
        - question_type_code: "physics_experiment"
          knowledge_point_id: "physics_g8_basic_experiment"
          target_mistake_tag_code: "PHY_E1"
          difficulty_code: "medium"
          question: "探究小车速度与斜面高度关系时，为什么每次应使用同一辆小车？"
          answer: "为了控制小车本身这一条件相同。"
          explanation: "只改变斜面高度，其余条件保持一致，才能比较速度变化。"
