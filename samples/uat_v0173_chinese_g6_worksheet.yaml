        - question_no: "1"
          question_type_code: "chinese_reading"
          knowledge_point_id: "chinese_g6_reading_inference"
          target_mistake_tag_code: "GEN_R2"
          difficulty_code: "medium"
          question: "阅读短文后，概括人物态度变化的原因。"
          answer: "需要结合事件前后变化作答。"
          explanation: "推断题必须回到文本线索，不能只写个人感受。"
        - question_no: "2"
