  sections:
    - name: "一、化学式与方程式"
      layout: "single_column"
      questions:
        - question_type_code: "chem_formula_writing"
          knowledge_point_id: "chem_g9_formula_writing"
          target_mistake_tag_code: "CHEM_F1"
          difficulty_code: "basic"
          question: "写出水和二氧化碳的化学式。"
          answer: "H2O；CO2"
          explanation: "水由氢、氧组成，化学式 H2O；二氧化碳是 CO2。"
        - question_type_code: "chem_equation_balancing"
          knowledge_point_id: "chem_g9_equation_balancing"
          target_mistake_tag_code: "CHEM_E1"
          difficulty_code: "medium"
          question: "配平：H2 + O2 -> H2O"
          answer: "2H2 + O2 -> 2H2O"
          explanation: "左右两边 H、O 原子个数都要相等。"
        - question_type_code: "chem_experiment"
          knowledge_point_id: "chem_g9_air_oxygen"
          target_mistake_tag_code: "CHEM_EXP1"
          difficulty_code: "medium"
          question: "加热高锰酸钾制取氧气时，为什么试管口要略向下倾斜？"
          answer: "防止冷凝水倒流使热试管炸裂。"
          explanation: "这是实验安全和现象解释问题，需区分现象与原因。"
