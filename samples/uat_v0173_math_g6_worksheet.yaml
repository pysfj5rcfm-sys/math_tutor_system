worksheet:
  title: "六年级数学预初适应训练 UAT"
  date: "2026-06-03"
  student_id: "daughter"
  subject_id: "math"
  grade_at_time: 6
  term_at_time: "六年级上"
  curriculum_version_at_time: "cn_k12_2022"
  textbook_version_at_time: "沪教版"
  source: "uat_v0173_fixture"
  sections:
    - name: "一、有理数符号训练"
      layout: "two_columns"
      questions:
        - question_no: "1"
          question_type_code: "math_calculation"
          knowledge_point_id: "math_g6a_rational_add_different_sign"
          target_mistake_tag_code: "MATH_SIGN_RULE_ERROR"
          difficulty_code: "basic"
          question: "计算：-7 + 12。"
          answer: "5"
          explanation: "异号相加，先比较绝对值，12 的绝对值较大，所以结果为正，12 - 7 = 5。"
    - name: "二、方程与应用"
      layout: "single_column"
      questions:
        - question_no: "2"
          question_type_code: "math_equation"
          knowledge_point_id: "math_g6a_one_step_equation_solving"
          target_mistake_tag_code: "MATH_EQUALITY_RELATION_ERROR"
          difficulty_code: "medium"
          question: "解方程：x + 9 = 21。"
          answer: "x = 12"
          explanation: "等式两边同时减 9，保持等价，得 x = 12。"
        - question_no: "3"
          question_type_code: "math_application"
          knowledge_point_id: "math_g6a_percentage_word_problem_model"
          target_mistake_tag_code: "MATH_QUANTITATIVE_RELATION_ERROR"
          difficulty_code: "medium"
          question: "一本书已经读了 45 页，占全书的 30%，这本书一共有多少页？"
          answer: "150 页"
          explanation: "45 页是比较量，30% 对应全书这个单位 1，所以全书页数为 45 / 30% = 150。"
