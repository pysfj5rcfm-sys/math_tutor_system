worksheet:
  title: "v0.1.9.1-pretrial 五下数学 X 轴回溯 UAT"
  date: "2026-06-11"
  student_id: "daughter"
  subject_id: "math"
  grade_at_time: 5
  term_at_time: "五年级下"
  curriculum_version_at_time: "cn_k12_2022"
  textbook_version_at_time: "沪教版"
  source: "uat_v0191_math_g5b_fixture"
  sections:
    - name: "一、直接修复"
      layout: "two_columns"
      questions:
        - question_no: "1"
          question_type_code: "math_geometry_calculation"
          knowledge_point_id: "math_g5b_rectangular_prism_volume_formula"
          target_mistake_tag_code: "MATH_FORMULA_APPLICATION_ERROR"
          difficulty_code: "basic"
          primary_target_id: "math_g5b_rectangular_prism_volume_formula::MATH_FORMULA_APPLICATION_ERROR"
          question_role: "repair"
          teaching_purpose: "直接修复长方体体积公式遗漏高的问题。"
          expected_error_mechanism: "学生可能只算底面积，把长乘宽误当成体积。"
          question: "一个长方体长 9 cm，宽 4 cm，高 3 cm，体积是多少立方厘米？"
          answer: "108 立方厘米"
          explanation: "长方体体积 = 长 x 宽 x 高，9 x 4 x 3 = 108。"
        - question_no: "2"
          question_type_code: "math_geometry_calculation"
          knowledge_point_id: "math_g5b_rectangular_prism_volume_formula"
          target_mistake_tag_code: "MATH_FORMULA_APPLICATION_ERROR"
          difficulty_code: "medium"
          primary_target_id: "math_g5b_rectangular_prism_volume_formula::MATH_FORMULA_APPLICATION_ERROR"
          question_role: "variant"
          teaching_purpose: "改变未知量位置，检查是否真正理解体积公式。"
          expected_error_mechanism: "学生可能不能从体积反推高，或单位处理遗漏。"
          question: "一个长方体体积是 96 立方分米，长 8 分米，宽 4 分米，高是多少分米？"
          answer: "3 分米"
          explanation: "高 = 体积 / (长 x 宽) = 96 / (8 x 4) = 3。"
    - name: "二、迁移与回顾"
      layout: "single_column"
      questions:
        - question_no: "3"
          question_type_code: "math_application"
          knowledge_point_id: "math_g5b_speed_time_distance_relation"
          target_mistake_tag_code: "MATH_QUANTITATIVE_RELATION_ERROR"
          difficulty_code: "medium"
          primary_target_id: "math_g5b_speed_time_distance_relation::MATH_QUANTITATIVE_RELATION_ERROR"
          question_role: "transfer"
          teaching_purpose: "把数量关系训练迁移到行程情境。"
          expected_error_mechanism: "学生可能没有先确认速度、时间、路程对应关系。"
          question: "小车每小时行 45 千米，行了 3 小时，一共行了多少千米？"
          answer: "135 千米"
          explanation: "路程 = 速度 x 时间，45 x 3 = 135。"
        - question_no: "4"
          question_type_code: "fill_blank"
          knowledge_point_id: "math_g5b_data_table_reading_review"
          target_mistake_tag_code: "MATH_DATA_GRAPH_READING_ERROR"
          difficulty_code: "basic"
          primary_target_id: "math_g5b_data_table_reading_review::MATH_DATA_GRAPH_READING_ERROR"
          question_role: "mixed_review"
          teaching_purpose: "低强度回顾 review_only 的统计表读取。"
          expected_error_mechanism: "学生可能只看相邻数字，没有定位到指定行列。"
          question: "某表中周一、周二、周三参加人数分别是 12、18、15。周三参加人数是（ ）人。"
          answer: "15"
          explanation: "先定位周三，再读取对应人数 15。"
