          knowledge_point_id: "english_g6_subject_verb_agreement"
          target_mistake_tag_code: "ENG_GRAM_2"
          difficulty_code: "medium"
          question: "Rewrite: He go to school by bus every day."
          answer: "He goes to school by bus every day."
          explanation: "第三人称单数主语 he 后，动词用 goes。"
        - question_no: "3"
          question_type_code: "english_reading"
          knowledge_point_id: "english_g6_reading_detail"
          target_mistake_tag_code: "ENG_READ_1"
          difficulty_code: "medium"
          question: "Read a short paragraph and find the sentence showing when the story happened."
          answer: "The sentence with the time clue should be cited."
          explanation: "细节定位题要回到原文找关键词。"
