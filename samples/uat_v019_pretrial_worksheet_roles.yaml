worksheet:
  title: "v0.1.9-pretrial 题目角色专项训练 UAT"
  date: "2026-06-05"
  student_id: "daughter"
  subject_id: "math"
  grade_at_time: 6
  term_at_time: "六年级上"
  curriculum_version_at_time: "cn_k12_2022"
  textbook_version_at_time: "沪教版"
  source: "uat_v019_pretrial_fixture"
  sections:
    - name: "一、直接修复"
      layout: "two_columns"
      questions:
        - question_no: "1"
          question_type_code: "math_calculation"
          knowledge_point_id: "math_g6a_rational_add_different_sign"
          target_mistake_tag_code: "MATH_SIGN_RULE_ERROR"
          difficulty_code: "basic"
          primary_target_id: "math_g6a_rational_add_different_sign::MATH_SIGN_RULE_ERROR"
          question_role: "repair"
          teaching_purpose: "直接修复异号相加时先判符号的问题。"
          expected_error_mechanism: "学生可能只做绝对值相减，忘记结果符号取绝对值较大数的符号。"
          question: "计算：-12 + 5。"
          answer: "-7"
          explanation: "异号相加，先比较绝对值，12 > 5，所以结果为负，再算 12 - 5 = 7。"
        - question_no: "2"
          question_type_code: "math_calculation"
          knowledge_point_id: "math_g6a_rational_add_different_sign"
          target_mistake_tag_code: "MATH_SIGN_RULE_ERROR"
          difficulty_code: "basic"
          primary_target_id: "math_g6a_rational_add_different_sign::MATH_SIGN_RULE_ERROR"
          question_role: "variant"
          teaching_purpose: "通过数字方向变化验证是否真正掌握异号相加符号规则。"
          expected_error_mechanism: "学生可能看到正数在前就默认结果为正。"
          question: "计算：7 + (-15)。"
          answer: "-8"
          explanation: "异号相加，绝对值较大的数是 -15，结果为负，15 - 7 = 8。"
    - name: "二、迁移与复习"
      layout: "single_column"
      questions:
        - question_no: "3"
          question_type_code: "math_application"
          knowledge_point_id: "math_g6a_rational_add_different_sign"
          target_mistake_tag_code: "MATH_SIGN_RULE_ERROR"
          difficulty_code: "medium"
          primary_target_id: "math_g6a_rational_add_different_sign::MATH_SIGN_RULE_ERROR"
          question_role: "transfer"
          teaching_purpose: "把异号相加符号判断迁移到温度变化情境。"
          expected_error_mechanism: "学生可能把下降和上升的方向只按数值相加，忽略负方向。"
          question: "早晨气温为 -6 摄氏度，中午升高 4 摄氏度，中午气温是多少摄氏度？"
          answer: "-2 摄氏度"
          explanation: "气温升高 4 摄氏度表示加 4，-6 + 4 = -2。"
        - question_no: "4"
          question_type_code: "math_application"
          knowledge_point_id: "math_g6a_percentage_word_problem_model"
          target_mistake_tag_code: "MATH_QUANTITATIVE_RELATION_ERROR"
          difficulty_code: "medium"
          primary_target_id: "math_g6a_percentage_word_problem_model::MATH_QUANTITATIVE_RELATION_ERROR"
          question_role: "mixed_review"
          teaching_purpose: "轻量复习百分数应用题中的单位 1 对应关系。"
          expected_error_mechanism: "学生可能混淆比较量、百分率和单位 1。"
          question: "图书角有 24 本故事书，占全部图书的 40%，图书角一共有多少本书？"
          answer: "60 本"
          explanation: "24 本对应全部图书的 40%，所以全部图书为 24 / 40% = 60 本。"
