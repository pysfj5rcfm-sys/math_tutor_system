worksheet:
  title: "沪教版六年级上数学 X/Y 专项训练 UAT"
  date: "2026-06-03"
  student_id: "daughter"
  subject_id: "math"
  grade_at_time: 6
  term_at_time: "六年级上"
  curriculum_version_at_time: "cn_k12_2022"
  textbook_version_at_time: "沪教版"
  source: "uat_v018_fixture"
  sections:
    - name: "一、有理数符号"
      layout: "two_columns"
      questions:
        - question_no: "1"
          question_type_code: "math_calculation"
          knowledge_point_id: "math_g6a_rational_add_different_sign"
          target_mistake_tag_code: "MATH_SIGN_RULE_ERROR"
          difficulty_code: "basic"
          question: "计算：-9 + 4。"
          answer: "-5"
          explanation: "异号相加，绝对值较大的数是 -9，结果为负，9 - 4 = 5。"
    - name: "二、百分数应用"
      layout: "single_column"
      questions:
        - question_no: "2"
          question_type_code: "math_application"
          knowledge_point_id: "math_g6a_percentage_word_problem_model"
          target_mistake_tag_code: "MATH_QUANTITATIVE_RELATION_ERROR"
          difficulty_code: "medium"
          question: "某班参加社团的学生有 18 人，占全班人数的 30%，这个班共有多少人？"
          answer: "60 人"
          explanation: "18 人是比较量，30% 对应全班人数，所以全班人数 = 18 / 30% = 60。"
    - name: "三、方程与数轴"
      layout: "single_column"
      questions:
        - question_no: "3"
          question_type_code: "math_equation"
          knowledge_point_id: "math_g6a_one_step_equation_solving"
          target_mistake_tag_code: "MATH_EQUALITY_RELATION_ERROR"
          difficulty_code: "medium"
          question: "解方程：x - 7 = 15。"
          answer: "x = 22"
          explanation: "等式两边同时加 7，保持等价，得 x = 22。"
        - question_no: "4"
          question_type_code: "fill_blank"
          knowledge_point_id: "math_g6a_number_line_representation"
          target_mistake_tag_code: "MATH_REPRESENTATION_TRANSFER_ERROR"
          difficulty_code: "basic"
          question: "数轴上点 A 在原点左侧 6 个单位处，点 A 表示的数是 ____。"
          answer: "-6"
          explanation: "原点左侧表示负方向，所以点 A 表示 -6。"
