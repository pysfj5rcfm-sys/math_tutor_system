        - question_type_code: "math_application"
          knowledge_point_id: "math_g6_word_problem_modeling"
          target_mistake_tag_code: "R4"
          difficulty_code: "medium"
          question: "图书角有 120 本书，借出其中的 1/4 后又归还 12 本，现在有多少本？"
          answer: "102 本"
          explanation: "先算借出 120×1/4=30 本，再算 120-30+12=102 本。"
        - question_type_code: "math_unit_conversion"
          knowledge_point_id: "math_g6_unit_conversion"
          target_mistake_tag_code: "U1"
          difficulty_code: "basic"
          question: "0.8 平方米等于多少平方分米？"
          answer: "80 平方分米"
          explanation: "1 平方米=100 平方分米，所以 0.8×100=80。"
